<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Paystack Login</title>
</head>
<body class="bg-[#011b33] flex flex-col items-center justify-center min-h-screen font-sans antialiased p-4">

  <div class="flex items-center mb-10">
    <svg class="h-8 w-auto mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 5H22M2 12H16M2 19H12" stroke="#00a3ff" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span class="text-white text-3xl font-bold tracking-tight">paystack</span>
  </div>

  <div class="bg-white rounded-md shadow-xl w-full max-w-[480px] p-8 sm:p-12 mb-8">
    <h2 class="text-gray-500 text-center uppercase tracking-widest text-sm font-medium mb-10">
      Sign in to your account
    </h2>

    <form class="space-y-4">
      <div>
        <input 
          type="email" 
          placeholder="Email address" 
          class="w-full px-4 py-3 border border-gray-200 rounded-md focus:outline-none focus:border-blue-400 placeholder-gray-300 transition-colors"
        >
      </div>

      <div class="relative">
        <input 
          type="password" 
          placeholder="Password" 
          class="w-full px-4 py-3 border border-gray-200 rounded-md focus:outline-none focus:border-blue-400 placeholder-gray-300 transition-colors"
        >
        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.67 8.5 7.652 6 12 6c4.348 0 8.33 2.5 9.964 5.678a1.012 1.012 0 0 1 0 .644C20.33 15.5 16.348 18 12 18c-4.348 0-8.33-2.5-9.964-5.678Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        </button>
      </div>

      <button class="w-full bg-[#70d18d] hover:bg-[#5fc07c] text-white font-bold py-4 rounded-md transition-colors mt-2 text-lg">
        Sign in
      </button>
    </form>

    <div class="mt-10 flex flex-col items-center space-y-4">
      <a href="#" class="text-[#00a3ff] hover:underline text-[15px]">Sign in with passkey</a>
      <a href="#" class="text-[#00a3ff] hover:underline text-[15px]">Sign in with Single Sign-On (SSO)</a>
    </div>
  </div>
  
  <div class="text-center text-white space-y-2">
    <p class="text-[15px]">New to Paystack? <a href="index.html" class="font-semibold hover:underline">sign up</a></p>
    <p class="text-[15px]"><a href="forgot-password.html" class="hover:underline">Forgot your password?</a></p>
  </div>

</body>
</html>
